<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebAR プロジェクト</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: white;
      border-radius: 20px;
      padding: 40px 30px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 90%;
      text-align: center;
    }

    h1 {
      font-size: 32px;
      color: #333;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 40px;
    }

    /* ===== 最初のスクリーン（見方選択） ===== */
    #mode-screen {
      display: block;
    }

    #model-screen {
      display: none;
    }

    #ar-view {
      display: none;
    }

    .mode-buttons {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }

    .mode-btn {
      padding: 20px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 70px;
    }

    .mode-btn:active {
      transform: scale(0.98);
    }

    .mode-btn-camera {
      background: linear-gradient(135deg, #FF6B6B 0%, #FF8E72 100%);
      box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
    }

    .mode-btn-camera:hover {
      box-shadow: 0 8px 25px rgba(255, 107, 107, 0.6);
    }

    .mode-btn-viewer {
      background: linear-gradient(135deg, #4ECDC4 0%, #44A08D 100%);
      box-shadow: 0 5px 20px rgba(78, 205, 196, 0.4);
    }

    .mode-btn-viewer:hover {
      box-shadow: 0 8px 25px rgba(78, 205, 196, 0.6);
    }

    .btn-icon {
      font-size: 28px;
    }

    /* ===== モデル選択スクリーン ===== */
    .model-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 20px;
    }

    .model-btn {
      padding: 20px;
      border: 2px solid #eee;
      border-radius: 12px;
      background: white;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }

    .model-btn:hover {
      border-color: #667eea;
      background: #f8f9ff;
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
    }

    .model-btn:active {
      transform: scale(0.95);
    }

    /* ===== 戻るボタン ===== */
    .back-btn {
      padding: 12px 24px;
      background: #f0f0f0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      color: #666;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    .back-btn:hover {
      background: #e0e0e0;
    }

    /* ===== AR ビューアースクリーン ===== */
    #ar-view {
      width: 100vw;
      height: 100vh;
      background: #000;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
    }

    #ar-view model-viewer {
      width: 100%;
      height: 100%;
    }

    .ar-controls {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 15px 20px;
      border-radius: 10px;
      z-index: 10;
      font-size: 14px;
    }

    .ar-back-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      z-index: 10;
      font-weight: bold;
    }

    .ar-back-btn:hover {
      background: rgba(0, 0, 0, 0.9);
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      color: white;
      padding: 30px 50px;
      border-radius: 15px;
      text-align: center;
      z-index: 100;
      display: none;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .error-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 50, 50, 0.95);
      color: white;
      padding: 30px 50px;
      border-radius: 15px;
      text-align: center;
      z-index: 100;
      display: none;
      max-width: 90vw;
    }

    .error-message h2 {
      margin-bottom: 15px;
      font-size: 24px;
    }

    .error-message p {
      margin: 10px 0;
      font-size: 14px;
    }

    .error-ok-btn {
      margin-top: 20px;
      padding: 10px 30px;
      background: white;
      color: #ff3232;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      .container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 28px;
      }

      .model-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- ===== スクリーン1：見方選択 ===== -->
  <div id="mode-screen" class="container">
    <h1>ようこそ！✨</h1>
    <p class="subtitle">WebAR体験へ</p>

    <div class="mode-buttons">
      <button class="mode-btn mode-btn-camera" onclick="goToARMode()">
        <span class="btn-icon">📱</span>
        <span>カメラでAR体験</span>
      </button>
      <button class="mode-btn mode-btn-viewer" onclick="goToModelSelect()">
        <span class="btn-icon">👁️</span>
        <span>3Dモデルを見る</span>
      </button>
    </div>

    <p style="font-size: 12px; color: #999;">実世界にARを重ねるか、モデル単体を見るか選べます</p>
  </div>

  <!-- ===== スクリーン2：モデル選択 ===== -->
  <div id="model-screen" class="container">
    <h1>モデルを選ぶ</h1>
    <p class="subtitle" id="screen-mode-label">見方を選んでください</p>

    <div class="model-grid" id="model-grid">
      <!-- JavaScriptで動的に生成 -->
    </div>

    <button class="back-btn" onclick="goBack()">← 戻る</button>
  </div>

  <!-- ===== スクリーン3：AR ビューアー ===== -->
  <div id="ar-view">
    <div class="ar-controls">
      モデル: <span id="ar-model-name">---</span>
    </div>
    <button class="ar-back-btn" onclick="backToModeSelect()">← 戻る</button>

    <model-viewer
      id="dynamic-viewer"
      src=""
      ar
      ar-modes="webxr scene-viewer quick-look"
      camera-controls
      touch-action="pan-y"
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      style="width: 100%; height: 100%;">
    </model-viewer>
  </div>

  <!-- ローディング表示 -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p id="loading-text">読み込み中...</p>
  </div>

  <!-- エラー表示 -->
  <div id="error-message" class="error-message">
    <h2 id="error-title">エラー</h2>
    <p id="error-text"></p>
    <button class="error-ok-btn" onclick="closeError()">OK</button>
  </div>

  <script>
    // ===== グローバル設定 =====
    const state = {
      currentMode: null, // 'ar' or 'viewer'
      selectedModel: null,
      models: [
        { name: 'untitled', label: '3Dモデル 1️⃣' },
        { name: 'flower', label: 'お花 🌸' },
        { name: 'cube', label: 'キューブ 🟦' },
        { name: 'sphere', label: '球体 🟡' }
      ]
    };

    // ===== DOM要素 =====
    const modeScreen = document.getElementById('mode-screen');
    const modelScreen = document.getElementById('model-screen');
    const arView = document.getElementById('ar-view');
    const modelGrid = document.getElementById('model-grid');
    const screenModeLabel = document.getElementById('screen-mode-label');
    const arModelName = document.getElementById('ar-model-name');
    const loadingEl = document.getElementById('loading');
    const loadingText = document.getElementById('loading-text');
    const errorEl = document.getElementById('error-message');
    const errorTitle = document.getElementById('error-title');
    const errorText = document.getElementById('error-text');
    const viewer = document.getElementById('dynamic-viewer');

    // ===== ユーティリティ関数 =====
    function showLoading(show = true, text = '読み込み中...') {
      loadingEl.style.display = show ? 'block' : 'none';
      loadingText.textContent = text;
    }

    function showError(title, message) {
      errorTitle.textContent = title;
      errorText.textContent = message;
      errorEl.style.display = 'block';
    }

    function closeError() {
      errorEl.style.display = 'none';
    }

    function switchScreen(screenName) {
      modeScreen.style.display = 'none';
      modelScreen.style.display = 'none';
      arView.style.display = 'none';

      if (screenName === 'mode') {
        modeScreen.style.display = 'block';
      } else if (screenName === 'model') {
        modelScreen.style.display = 'block';
      } else if (screenName === 'ar') {
        arView.style.display = 'block';
      }
    }

    // ===== 見方選択画面から移動 =====
    function goToARMode() {
      state.currentMode = 'ar';
      screenModeLabel.textContent = 'ARで見るモデルを選んでください';
      renderModelGrid();
      switchScreen('model');
    }

    function goToModelSelect() {
      state.currentMode = 'viewer';
      screenModeLabel.textContent = '3Dビューアーで見るモデルを選んでください';
      renderModelGrid();
      switchScreen('model');
    }

    // ===== モデルグリッド生成 =====
    function renderModelGrid() {
      modelGrid.innerHTML = '';
      state.models.forEach(model => {
        const btn = document.createElement('button');
        btn.className = 'model-btn';
        btn.textContent = model.label;
        btn.onclick = () => selectModel(model.name);
        modelGrid.appendChild(btn);
      });
    }

    // ===== モデル選択 =====
    function selectModel(modelName) {
      state.selectedModel = modelName;

      if (state.currentMode === 'ar') {
        loadARView(modelName);
      } else if (state.currentMode === 'viewer') {
        loadViewerMode(modelName);
      }
    }

    // ===== AR ビューアー読み込み =====
    function loadARView(modelName) {
      showLoading(true, 'ARを起動中...');
      arModelName.textContent = modelName;

      const modelPath = `assets/models/${modelName}.glb`;
      viewer.src = modelPath;

      switchScreen('ar');

      // モデル読み込み監視
      const onLoad = () => {
        console.log(`✅ モデル「${modelName}」が読み込まれました`);
        showLoading(false);
        viewer.removeEventListener('load', onLoad);
        viewer.removeEventListener('error', onError);
      };

      const onError = (event) => {
        console.error('❌ モデル読み込みエラー:', event);
        showLoading(false);
        switchScreen('model');
        showError(
          '❌ モデルが見つかりません',
          `assets/models/${modelName}.glb が存在しません。\nファイル名やパスを確認してください。`
        );
        viewer.removeEventListener('load', onLoad);
        viewer.removeEventListener('error', onError);
      };

      viewer.addEventListener('load', onLoad);
      viewer.addEventListener('error', onError);
    }

    // ===== 3D ビューアーモード =====
    function loadViewerMode(modelName) {
      showLoading(true, 'モデルを読み込み中...');
      arModelName.textContent = modelName;

      const modelPath = `assets/models/${modelName}.glb`;
      viewer.src = modelPath;

      switchScreen('ar');

      const onLoad = () => {
        console.log(`✅ モデル「${modelName}」��読み込まれました`);
        showLoading(false);
        viewer.removeEventListener('load', onLoad);
        viewer.removeEventListener('error', onError);
      };

      const onError = (event) => {
        console.error('❌ モデル読み込みエラー:', event);
        showLoading(false);
        switchScreen('model');
        showError(
          '❌ モデルが見つかりません',
          `assets/models/${modelName}.glb が存在しません。\nファイル名やパスを確認してください。`
        );
        viewer.removeEventListener('load', onLoad);
        viewer.removeEventListener('error', onError);
      };

      viewer.addEventListener('load', onLoad);
      viewer.addEventListener('error', onError);
    }

    // ===== 戻るボタン =====
    function goBack() {
      switchScreen('mode');
    }

    function backToModeSelect() {
      switchScreen('mode');
    }

    // ===== 初期化 =====
    document.addEventListener('DOMContentLoaded', () => {
      switchScreen('mode');
      console.log('✅ WebAR プロジェクトが初期化されました');
    });
  </script>

</body>
</html>
