<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>親子de メタバース・ガーデン</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=M+PLUS+Rounded+1c:wght@400;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'M PLUS Rounded 1c', sans-serif;
  }

  .phone {
    width: 360px;
    height: 720px;
    border-radius: 48px;
    border: 3px solid #333;
    overflow: hidden;
    position: relative;
    background: #1565c0;
  }

  .screen {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 80px 24px 56px;
    overflow: hidden;
    background-image: url('gamestart-assets/bg.png');
    background-size: cover;
    background-position: center;
    background-color: #1976d2;
  }

  /* タイトルエリア */
  .title-area {
    text-align: center;
    z-index: 3;
    animation: titleFloat 3.5s ease-in-out infinite;
  }
  @keyframes titleFloat {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-7px); }
  }

  .title-logo {
    width: 280px;
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0 2px 16px rgba(0,0,80,0.6));
    z-index: 3;
  }

  /* 指紋ボタンエリア */
  .fp-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    z-index: 3;
  }

  .fp-btn {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: rgba(13, 71, 161, 0.7);
    border: 2px solid rgba(144,202,249,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .fp-btn:active { transform: scale(0.93); }

  .fp-btn canvas {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    z-index: 2;
  }

  /* プログレスバー（外周の光） */
  .progress-ring {
    position: absolute;
    top: -2px; left: -2px;
    transform: rotate(-90deg);
    pointer-events: none;
    z-index: 3;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .progress-ring__circle {
    stroke-dasharray: 283;
    stroke-dashoffset: 283;
  }
  .fp-btn.scanning .progress-ring {
    opacity: 1;
  }
  .fp-btn.scanning .progress-ring__circle {
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .tap-hint {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 2px;
    color: #bbdefb;
    animation: blinkHint 1.8s ease-in-out infinite;
  }
  @keyframes blinkHint {
    0%,100% { opacity: 0.4; }
    50%      { opacity: 1; }
  }

  .game-start-label {
    font-size: 10px;
    color: #90caf9;
    letter-spacing: 3px;
    opacity: 0.6;
  }

  /* スタートフラッシュ */
  .start-flash {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    background: rgba(13,71,161,0.95);
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    border-radius: 45px;
    transition: opacity 0.2s;
  }
  .start-flash.show { opacity: 1; }

  .start-icon {
    font-size: 56px;
    animation: startPop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .start-text {
    font-family: 'Dela Gothic One', sans-serif;
    font-size: 32px;
    color: #fff;
    letter-spacing: 4px;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
    animation: startPop 0.3s 0.05s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes startPop {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* 波紋 */
  .ripple-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(144,202,249,0.9);
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    animation: rippleOut 0.6s ease-out forwards;
    pointer-events: none;
    box-shadow: 0 0 10px rgba(144,202,249,0.5);
  }
  @keyframes rippleOut {
    from { width: 0; height: 0; opacity: 1; }
    to   { width: 160px; height: 160px; opacity: 0; }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="screen" id="screen">

    <div class="title-area">
      <img src="gamestart-assets/logo.png" alt="親子de メタバース・ガーデン" class="title-logo">
    </div>

    <div class="fp-area">
      <div class="fp-btn" id="fpBtn" onclick="handleTap()">
        <svg class="progress-ring" width="94" height="94">
          <circle class="progress-ring__circle" stroke="#fff" stroke-width="3" fill="transparent" r="45" cx="47" cy="47"/>
        </svg>
        <canvas id="fpCanvas" width="64" height="64"></canvas>
      </div>
      <div class="tap-hint">ここをタップ</div>
      <div class="game-start-label">GAME START</div>
    </div>

    <div class="start-flash" id="startFlash">
      <div class="start-icon">✨</div>
      <div class="start-text">スタート！</div>
    </div>

  </div>
</div>

<script>
/* ---- リアルな指紋描画 ---- */
const canvas = document.getElementById('fpCanvas');
const ctx = canvas.getContext('2d');
const W = 64, H = 64, CX = 32, CY = 36;

const BASE_COLOR = 'rgba(144,202,249,'; 
const GLOW_COLOR = 'rgba(255,255,255,';

let isGlowing = false;

const loops = [];
for(let i=1; i<=14; i++) {
  loops.push({
    rx: 2.5 + i * 1.8,
    ry: 1.5 + i * 1.4,
    startAngle: Math.PI * (0.15 - i * 0.008),
    endAngle: Math.PI * (0.85 + i * 0.008),
    y: i * 0.4,
    offsetX: Math.sin(i * 0.4) * 1.5
  });
}

function drawFingerprint(glow) {
  ctx.clearRect(0, 0, W, H);

  loops.forEach((l, i) => {
    if(i % 5 === 0 && !glow) return; 

    const alpha = glow ? 0.9 : 0.4 + (i * 0.02);
    const color = glow ? GLOW_COLOR : BASE_COLOR;
    
    ctx.beginPath();
    ctx.ellipse(CX + l.offsetX, CY - l.y, l.rx, l.ry, 0, l.startAngle, l.endAngle);
    ctx.strokeStyle = color + alpha + ')';
    ctx.lineWidth = glow ? 1.5 : 1.0;
    ctx.lineCap = 'round';
    ctx.stroke();
  });

  ctx.beginPath();
  ctx.ellipse(CX, CY, 1.5, 1, 0, 0, Math.PI * 2);
  ctx.strokeStyle = (glow ? GLOW_COLOR : BASE_COLOR) + (glow ? '0.9' : '0.5') + ')';
  ctx.lineWidth = glow ? 1.5 : 1.0;
  ctx.stroke();

  const lines = [-10, -6, -2, 2, 6, 10];
  lines.forEach(x => {
    const alpha = glow ? 0.8 : 0.3;
    const color = glow ? GLOW_COLOR : BASE_COLOR;
    ctx.beginPath();
    ctx.moveTo(CX + x, CY + 4 + Math.abs(x)*0.5);
    ctx.lineTo(CX + x + (x*0.1), CY + 14 + Math.abs(x));
    ctx.strokeStyle = color + alpha + ')';
    ctx.lineWidth = glow ? 1.5 : 1.0;
    ctx.stroke();
  });

  if (glow) {
    const rad = ctx.createRadialGradient(CX, CY, 0, CX, CY, 30);
    rad.addColorStop(0, 'rgba(255,255,255,0.3)');
    rad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = rad;
    ctx.beginPath();
    ctx.arc(CX, CY, 30, 0, Math.PI * 2);
    ctx.fill();
  }
}

drawFingerprint(false);

/* ---- タップ＆テンポアップ処理 ---- */
function handleTap() {
  if (isGlowing) return;
  isGlowing = true;

  if (navigator.vibrate) {
    navigator.vibrate(50);
  }

  const btn = document.getElementById('fpBtn');
  btn.classList.add('scanning');
  
  btn.style.background = 'rgba(13,71,161,0.9)';
  btn.style.boxShadow = '0 0 20px #90caf9, 0 0 50px rgba(144,202,249,0.5)';
  btn.style.borderColor = '#fff';

  for (let i = 0; i < 2; i++) {
    setTimeout(() => {
      const r = document.createElement('div');
      r.className = 'ripple-ring';
      btn.appendChild(r);
      setTimeout(() => r.remove(), 600);
    }, i * 150);
  }

  let step = 0;
  const glowSteps = loops.length;
  const stepInterval = setInterval(() => {
    ctx.clearRect(0, 0, W, H);
    drawFingerprintPartial(step);
    step++;
    if (step > glowSteps) {
      clearInterval(stepInterval);
      drawFingerprint(true);
    }
  }, 20); 

  setTimeout(() => {
    document.getElementById('startFlash').classList.add('show');
    if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
  }, 850);

  setTimeout(() => {
    sessionStorage.setItem('splashDone', '1');
    window.location.href = 'index.html';
  }, 1600);
}

function drawFingerprintPartial(lit) {
  drawFingerprint(false);
  for (let i = 0; i <= Math.min(lit, loops.length - 1); i++) {
    const l = loops[i];
    ctx.beginPath();
    ctx.ellipse(CX + l.offsetX, CY - l.y, l.rx, l.ry, 0, l.startAngle, l.endAngle);
    ctx.strokeStyle = 'rgba(255,255,255,0.95)';
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
}
</script>
</body>
</html>
