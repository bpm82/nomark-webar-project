<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ノーマーカーARビューワー</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    body { 
      width: 100vw; 
      height: 100vh; 
      overflow: hidden; 
      background: #000; 
      font-family: sans-serif;
    }
    model-viewer { 
      width: 100%; 
      height: 100%;
      --poster-color: transparent;
    }
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 30px 50px;
      border-radius: 15px;
      text-align: center;
      z-index: 100;
      display: none;
    }
    #loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #ar-button {
      position: absolute; 
      bottom: 30px; 
      left: 50%; 
      transform: translateX(-50%);
      padding: 15px 35px; 
      border-radius: 50px; 
      background-color: #FF6B6B; 
      color: #fff;
      border: none; 
      font-size: 18px; 
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      z-index: 10;
      display: none;
      transition: all 0.3s ease;
    }
    #ar-button:active {
      transform: translateX(-50%) scale(0.95);
    }
    #error-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 50, 50, 0.95);
      color: white;
      padding: 30px 50px;
      border-radius: 15px;
      text-align: center;
      z-index: 100;
      display: none;
      max-width: 90vw;
    }
    #error-message h2 {
      margin: 0 0 15px 0;
      font-size: 24px;
    }
    #error-message p {
      margin: 10px 0;
      font-size: 14px;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.6);
      padding: 15px 20px;
      border-radius: 8px;
      display: none;
      z-index: 5;
    }
  </style>
</head>
<body>

  <model-viewer 
    id="dynamic-viewer" 
    src="" 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    touch-action="pan-y"
    auto-rotate
    shadow-intensity="1"
    exposure="1">
    <button slot="ar-button" id="ar-button">📱 ARで見る</button>
  </model-viewer>

  <div id="loading">
    <div id="loading-spinner"></div>
    <p>カメラを起動中...</p>
  </div>

  <div id="error-message"></div>

  <div id="info">
    モデル: <span id="model-name">---</span>
  </div>

  <script>
    // ===== グローバル設定 =====
    const state = {
      modelName: null,
      viewer: null,
      arButton: null,
      isLoading: false
    };

    // ===== DOM要素取得 =====
    state.viewer = document.getElementById('dynamic-viewer');
    state.arButton = document.getElementById('ar-button');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error-message');
    const infoEl = document.getElementById('info');
    const modelNameSpan = document.getElementById('model-name');

    // ===== ユーティリティ関数 =====
    function showLoading(show = true) {
      loadingEl.style.display = show ? 'flex' : 'none';
    }

    function showError(title, message) {
      errorEl.innerHTML = `
        <h2>${title}</h2>
        <p>${message}</p>
        <p style="font-size:12px; margin-top:20px; opacity:0.8;">index.html に戻って別のモデルを試してください</p>
      `;
      errorEl.style.display = 'block';
      state.arButton.style.display = 'none';
      infoEl.style.display = 'none';
    }

    // ===== アプリ内ブラウザ検出 =====
    const isInAppBrowser = /Line|Twitter|X11|Instagram|Facebook/i.test(navigator.userAgent);
    if (isInAppBrowser) {
      showError(
        '⚠️ アプリ内ブラウザでは動作しません',
        'Safari（iOS）または Chrome（Android）で直接開いてください。'
      );
    }

    // ===== AR対応デバイス検出 =====
    async function checkARSupport() {
      try {
        // WebXR をサポートしているか確認
        const supported = await navigator.xr?.isSessionSupported('immersive-ar');
        if (!supported) {
          console.warn('WebXR immersive-ar is not supported');
          // Quick Look や Scene Viewer にフォールバック
        }
      } catch (error) {
        console.log('AR support check failed:', error);
      }
    }

    // ===== 初期化 =====
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search);
      state.modelName = urlParams.get('model') || urlParams.get('id') || null;

      if (!state.modelName) {
        showError('❌ モデル指定がありません', 'ar.html?model=untitled のようにパラメータを指定してください');
        return;
      }

      // 情報表示
      modelNameSpan.textContent = state.modelName;
      infoEl.style.display = 'block';

      // モデルパス設定
      const modelPath = `assets/models/${state.modelName}.glb`;
      state.viewer.src = modelPath;

      console.log(`📦 モデルを読み込み中: ${modelPath}`);
      showLoading(true);

      // AR対応確認
      await checkARSupport();

      // ===== モデル読み込み成功 =====
      state.viewer.addEventListener('load', () => {
        console.log(`✅ モデル「${state.modelName}」が正常に読み込まれました`);
        showLoading(false);
        
        // AR対応なら「ARで見る」ボタンを表示
        state.arButton.style.display = 'block';
      });

      // ===== モデル読み込み失敗 =====
      state.viewer.addEventListener('error', (event) => {
        console.error('❌ モデル読み込みエラー:', event);
        showLoading(false);
        showError(
          '❌ モデルが見つかりません',
          `assets/models/${state.modelName}.glb が存在しません。<br/>ファイル名やパスを確認してください。`
        );
      });

      // ===== AR状態検出 =====
      state.viewer.addEventListener('ar-status', (event) => {
        console.log('AR status:', event.detail);
        if (!event.detail.canActivateAR) {
          console.warn('このデバイス/ブラウザはAR非対応です');
          state.arButton.textContent = '⚠️ AR非対応';
          state.arButton.disabled = true;
        }
      });

      // ===== ARボタンクリック時のカメラ起動 =====
      state.arButton.addEventListener('click', async () => {
        console.log('🎥 ARボタンをクリック - カメラアクセス要求...');
        showLoading(true);

        try {
          // カメラアクセス許可を明示的に要求
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'environment' },
            audio: false
          });

          console.log('✅ カメラアクセス許可を取得しました');
          showLoading(false);

          // ストリームを停止（model-viewer が独自に管理するため）
          stream.getTracks().forEach(track => track.stop());

          // AR起動（model-viewer に任せる）
          state.viewer.activateAR();
        } catch (error) {
          showLoading(false);
          console.error('❌ カメラアクセスエラー:', error);
          
          if (error.name === 'NotAllowedError') {
            showError(
              '❌ カメラへのアクセスが拒否されました',
              '設定でカメラの使用を許可してください。'
            );
          } else if (error.name === 'NotFoundError') {
            showError(
              '❌ カメラが見つかりません',
              'デバイスにカメラがないか、他のアプリが使用中です。'
            );
          } else {
            showError(
              '❌ カメラアクセスエラー',
              error.message
            );
          }
        }
      });
    });
  </script>

</body>
</html>
  </div>

  <script>
    // ===== アプリ内ブラウザ検出 =====
    const isInAppBrowser = /Line|Twitter|X11|Instagram|Facebook/i.test(navigator.userAgent);
    if (isInAppBrowser) {
      alert('⚠️ このアプリ内ブラウザではAR機能が制限されています。\n\nSafari（iOS）または Chrome（Android）で直接開いてください！');
    }

    // ===== 初期化 =====
    document.addEventListener("DOMContentLoaded", () => {
      const urlParams = new URLSearchParams(window.location.search);
      const modelName = urlParams.get('model'); 
      const viewer = document.getElementById('dynamic-viewer');
      const arButton = document.getElementById('ar-button');
      const infoDiv = document.getElementById('info');
      const modelNameSpan = document.getElementById('model-name');

      if (modelName) {
        // モデルパスを設定
        const modelPath = `assets/models/${modelName}.glb`;
        viewer.src = modelPath;
        
        // 情報表示
        modelNameSpan.textContent = modelName;
        infoDiv.style.display = 'block';
        
        // ===== モデル読み込み成功 =====
        viewer.addEventListener('load', () => {
          console.log('✅ モデル「' + modelName + '」が正常に読み込まれました');
          arButton.style.display = 'block';
        });
        
        // ===== モデル読み込み失敗 =====
        viewer.addEventListener('error', (event) => {
          console.error('❌ モデル読み込みエラー:', event);
          arButton.textContent = '❌ モデルが見つかりません';
          arButton.style.backgroundColor = '#888';
          arButton.style.cursor = 'not-allowed';
          arButton.disabled = true;
          
          const errorMsg = `<h2 style="color:white; text-align:center; margin-top:50vh; transform:translateY(-50%);">
            ❌ モデルが見つかりません<br/><br/>
            <span style="font-size:14px;">assets/models/${modelName}.glb<br/>を確認してください</span>
          </h2>`;
          document.body.innerHTML = errorMsg;
        });

        // ===== カメラ許可確認 =====
        viewer.addEventListener('ar-status', (event) => {
          if (!event.detail.canActivateAR) {
            arButton.textContent = '⚠️ このデバイスはAR非対応';
            arButton.disabled = true;
            console.warn('このデバイスはAR非対応です');
          }
        });

      } else {
        // モデル指定がない場合
        document.body.innerHTML = `
          <h2 style="color:white; text-align:center; margin-top:50vh; transform:translateY(-50%);">
            ❌ モデルが指定されていません<br/><br/>
            <span style="font-size:14px;">例: ar.html?model=untitled</span>
          </h2>
        `;
      }
    });
  </script>
</body>
</html>
